<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">

  <!-- Background -->
  <rect width="1600" height="900" fill="#0F2E24"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F4D3A"/>
      <stop offset="100%" stop-color="#0B1F17"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#grad1)" />

  <!-- Distant mountains -->
  <path d="M0 600 L200 400 L350 520 L500 350 L700 550 L900 300 L1100 580 L1300 400 L1600 600 L1600 900 L0 900 Z"
        fill="#2E6B52" opacity="0.4"/>

  <!-- Mid mountains -->
  <path d="M0 700 L180 520 L320 620 L480 450 L650 680 L820 500 L1000 720 L1200 480 L1400 690 L1600 550 L1600 900 L0 900 Z"
        fill="#2E6B52" opacity="0.7"/>

  <!-- Foreground hills -->
  <path d="M0 780 L150 650 L300 750 L450 620 L650 800 L900 650 L1100 820 L1300 700 L1500 780 L1600 760 L1600 900 L0 900 Z"
        fill="#3E8A6D"/>

  <!-- Light fog overlay -->
  <rect width="1600" height="900" fill="white" opacity="0.05"/>

</svg>
